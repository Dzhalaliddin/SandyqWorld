<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Админ-панель — Sandyq</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ===== ДОПОЛНИТЕЛЬНЫЕ СТИЛИ ДЛЯ АДМИНКИ ===== */
    .theme-btn-admin {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      color: #f7971e;
      cursor: pointer;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }
    .theme-btn-admin:hover {
      background: rgba(255,255,255,0.15);
      box-shadow: 0 0 20px rgba(247,151,30,0.3);
    }
    body.light-theme .theme-btn-admin {
      color: #c49a2a;
      border-color: rgba(0,0,0,0.2);
    }
    body.light-theme .theme-btn-admin:hover {
      background: rgba(0,0,0,0.08);
    }
    .admin-header .top-controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    /* ===== АДМИН ПАНЕЛЬ ===== */
    .login-box {
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 40px;
      width: 380px;
      max-width: 90%;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      transition: background 0.3s ease, border-color 0.3s ease;
    }
    body.light-theme .login-box {
      background: rgba(255,248,240,0.95);
      border-color: rgba(0,0,0,0.15);
      box-shadow: 0 20px 50px rgba(0,0,0,0.1);
    }
    body.light-theme .login-box h1 { color: #c49a2a; }
    body.light-theme .login-box p { color: #555; }
    body.light-theme .login-box input {
      background: rgba(255,255,255,0.8);
      border-color: rgba(0,0,0,0.15);
      color: #2a1508;
    }
    body.light-theme .login-box input:focus {
      border-color: #c49a2a;
      box-shadow: 0 0 15px rgba(196,154,42,0.2);
    }
    .login-box h1 { font-size: 2rem; margin-bottom: 10px; color: #f7971e; font-family: 'Playfair Display', serif; }
    .login-box input {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: white;
      font-size: 1rem;
      outline: none;
      font-family: 'Roboto', 'Segoe UI', sans-serif;
    }
    .login-box input:focus { border-color: #f7971e; }
    .login-box button {
      width: 100%;
      padding: 14px;
      margin-top: 15px;
      background: linear-gradient(135deg, #f7971e, #e67e22);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Roboto', 'Segoe UI', sans-serif;
    }
    .login-box button:hover { box-shadow: 0 8px 25px rgba(247,151,30,0.5); }
    body.light-theme .login-box button {
      background: linear-gradient(135deg, #c49a2a, #a88820);
    }
    .error { color: #e74c3c; margin-top: 10px; display: none; }

    .admin-panel { display: none; width: 100%; max-width: 1400px; padding: 30px; }
    body.light-theme .admin-panel h1 { color: #2a1508; }
    body.light-theme .admin-panel .admin-header > div p { color: #666; }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
      gap: 15px;
    }
    .admin-nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .admin-nav a, .admin-nav button {
      padding: 10px 20px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      color: white;
      text-decoration: none;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.3s;
      font-family: 'Roboto', 'Segoe UI', sans-serif;
    }
    .admin-nav a:hover, .admin-nav button:hover { background: rgba(255,255,255,0.1); }
    .admin-nav a.active { background: #f7971e; color: white; border-color: #f7971e; }
    body.light-theme .admin-nav a,
    body.light-theme .admin-nav button {
      background: rgba(255,255,255,0.7);
      border-color: rgba(0,0,0,0.12);
      color: #2a1508;
    }
    body.light-theme .admin-nav a:hover,
    body.light-theme .admin-nav button:hover {
      background: rgba(255,255,255,0.9);
      border-color: rgba(0,0,0,0.2);
    }
    body.light-theme .admin-nav a.active {
      background: #c49a2a;
      color: white;
      border-color: #c49a2a;
    }
    body.light-theme .admin-nav a.active:hover {
      background: #a88820;
    }

    .logout-btn { background: #e74c3c !important; border: none !important; }
    body.light-theme .logout-btn {
      background: #e74c3c !important;
      color: white !important;
    }
    body.light-theme .logout-btn:hover {
      background: #c0392b !important;
    }

    .back-link {
      color: #f7971e;
      text-decoration: none;
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 10px 20px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      transition: color 0.3s ease, background 0.3s ease, border-color 0.3s ease;
      font-family: 'Roboto', 'Segoe UI', sans-serif;
    }
    body.light-theme .back-link {
      color: #c49a2a;
      background: rgba(255,255,255,0.7);
      border-color: rgba(0,0,0,0.12);
    }
    body.light-theme .back-link:hover {
      background: rgba(255,255,255,0.9);
    }

    .total-orders {
      background: rgba(255,255,255,0.05);
      padding: 12px 24px;
      border-radius: 18px;
      transition: background 0.3s ease;
      color: #fff;
      font-family: 'Roboto', 'Segoe UI', sans-serif;
      font-size: 0.9rem;
    }
    body.light-theme .total-orders {
      background: rgba(255,255,255,0.7);
      color: #2a1508;
    }
    body.light-theme .total-orders span { color: #c49a2a; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 15px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 18px;
      text-align: center;
      transition: background 0.3s ease, border-color 0.3s ease;
    }
    body.light-theme .stat-card {
      background: rgba(255,255,255,0.7);
      border-color: rgba(0,0,0,0.08);
    }
    .stat-value { font-size: 1.8rem; font-weight: 800; color: #f7971e; font-family: 'Playfair Display', serif; }
    body.light-theme .stat-value { color: #c49a2a; }
    .stat-label {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.5);
      transition: color 0.3s ease;
      font-family: 'Roboto', 'Segoe UI', sans-serif;
    }
    body.light-theme .stat-label { color: rgba(0,0,0,0.5); }

    .chart-container {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 30px;
      transition: background 0.3s ease, border-color 0.3s ease;
    }
    body.light-theme .chart-container {
      background: rgba(255,255,255,0.7);
      border-color: rgba(0,0,0,0.08);
    }
    .chart-bars {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      height: 200px;
      padding: 10px 0;
    }
    .chart-bar {
      flex: 1;
      background: linear-gradient(180deg, #f7971e, #e67e22);
      border-radius: 6px 6px 0 0;
      min-width: 25px;
      position: relative;
      cursor: pointer;
      transition: all 0.3s;
    }
    body.light-theme .chart-bar {
      background: linear-gradient(180deg, #c49a2a, #a88820);
    }
    .chart-bar:hover { opacity: 0.8; transform: scaleY(1.02); }
    .chart-bar-value {
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.7rem;
      font-weight: 700;
      color: #f7971e;
      white-space: nowrap;
      font-family: 'Roboto', 'Segoe UI', sans-serif;
    }
    body.light-theme .chart-bar-value { color: #c49a2a; }
    .chart-bar-label {
      position: absolute;
      bottom: -22px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.65rem;
      color: rgba(255,255,255,0.5);
      white-space: nowrap;
      transition: color 0.3s ease;
      font-family: 'Roboto', 'Segoe UI', sans-serif;
    }
    body.light-theme .chart-bar-label { color: rgba(0,0,0,0.4); }

    .dishes-stats {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 30px;
      transition: background 0.3s ease, border-color 0.3s ease;
    }
    body.light-theme .dishes-stats {
      background: rgba(255,255,255,0.7);
      border-color: rgba(0,0,0,0.08);
    }
    .dish-stat-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: border-color 0.3s ease;
      font-family: 'Roboto', 'Segoe UI', sans-serif;
    }
    body.light-theme .dish-stat-row { 
      border-bottom-color: rgba(0,0,0,0.06);
      color: #2a1508;
    }
    body.light-theme .dish-stat-row span { color: #2a1508; }
    .dish-stat-qty { font-weight: 700; color: #f7971e; }
    body.light-theme .dish-stat-qty { color: #c49a2a; }

    .date-filter {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .date-filter input, .date-filter select {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 10px 14px;
      border-radius: 12px;
      color: white;
      color-scheme: dark;
      font-size: 0.9rem;
      transition: background 0.3s ease, border-color 0.3s ease, color 0.3s ease;
      font-family: 'Roboto', 'Segoe UI', sans-serif;
    }
    body.light-theme .date-filter input,
    body.light-theme .date-filter select {
      background: rgba(255,255,255,0.7);
      border-color: rgba(0,0,0,0.12);
      color: #2a1508;
    }
    .date-filter input:focus, .date-filter select:focus { border-color: #f7971e; outline: none; }
    body.light-theme .date-filter input:focus,
    body.light-theme .date-filter select:focus { border-color: #c49a2a; }
    .date-filter label {
      color: rgba(255,255,255,0.5);
      font-size: 0.85rem;
      font-family: 'Roboto', 'Segoe UI', sans-serif;
    }
    body.light-theme .date-filter label { color: rgba(0,0,0,0.4); }

    .order-card {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255,255,255,0.06);
      border-left: 3px solid #f7971e;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      transition: all 0.3s;
      color: #fff;
      font-family: 'Roboto', 'Segoe UI', sans-serif;
    }
    body.light-theme .order-card {
      background: rgba(255,255,255,0.7);
      border-color: rgba(0,0,0,0.08);
      border-left-color: #c49a2a;
      color: #2a1508;
    }
    .order-card:hover { transform: translateX(4px); border-color: rgba(247,151,30,0.3); }
    body.light-theme .order-card:hover { border-color: rgba(196,154,42,0.3); }

    .booking-card {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255,255,255,0.06);
      border-left: 3px solid #3498db;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      transition: all 0.3s;
      color: #fff;
      font-family: 'Roboto', 'Segoe UI', sans-serif;
    }
    body.light-theme .booking-card {
      background: rgba(255,255,255,0.7);
      border-color: rgba(0,0,0,0.08);
      border-left-color: #2980b9;
      color: #2a1508;
    }
    .booking-card:hover { transform: translateX(4px); border-color: rgba(52,152,219,0.3); }

    .order-total {
      font-size: 1.2rem;
      font-weight: 700;
      color: #f7971e;
      text-align: right;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.06);
      transition: color 0.3s ease, border-color 0.3s ease;
    }
    body.light-theme .order-total {
      color: #c49a2a;
      border-top-color: rgba(0,0,0,0.06);
    }

    .city-tag {
      display: inline-block;
      background: #2ecc71;
      color: white;
      padding: 1px 10px;
      border-radius: 12px;
      font-size: 0.65rem;
      font-weight: 600;
      margin-left: 6px;
    }

    .btn {
      padding: 7px 14px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 0.85rem;
      color: white;
      transition: all 0.3s;
      font-family: 'Roboto', 'Segoe UI', sans-serif;
    }
    .btn:hover { transform: scale(1.05); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    .btn-print { background: #9b59b6; }
    .btn-pdf { background: #e67e22; }
    .btn-delete { background: #e74c3c; }
    .btn-refresh { background: #2ecc71; }
    .btn-preorder { background: #3498db; }
    .btn-excel { background: #217346; }
    .btn-sync { background: linear-gradient(135deg, #6c5ce7, #a29bfe); }
    .btn-edit { background: #f39c12; }

    .empty-orders {
      text-align: center;
      color: rgba(255,255,255,0.3);
      padding: 50px;
      font-family: 'Roboto', 'Segoe UI', sans-serif;
      transition: color 0.3s ease;
    }
    body.light-theme .empty-orders { color: rgba(0,0,0,0.3); }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 700;
      margin: 25px 0 15px;
      color: #f7971e;
      transition: color 0.3s ease;
    }
    body.light-theme .section-title { color: #c49a2a; }

    .booking-stats-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      font-family: 'Roboto', 'Segoe UI', sans-serif;
    }
    .booking-stats-table th, .booking-stats-table td {
      padding: 10px;
      border: 1px solid rgba(255,255,255,0.08);
      font-size: 0.9rem;
      transition: border-color 0.3s ease, color 0.3s ease;
      color: #fff;
    }
    body.light-theme .booking-stats-table th,
    body.light-theme .booking-stats-table td {
      border-color: rgba(0,0,0,0.06);
      color: #2a1508;
    }
    .booking-stats-table th {
      background: rgba(247,151,30,0.2);
      color: #f7971e;
      transition: background 0.3s ease, color 0.3s ease;
    }
    body.light-theme .booking-stats-table th {
      background: rgba(196,154,42,0.15);
      color: #c49a2a;
    }

    .sync-status {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      padding: 12px 20px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.1);
      font-size: 0.85rem;
      z-index: 100;
      display: none;
      transition: background 0.3s ease, border-color 0.3s ease, color 0.3s ease;
      color: #fff;
      font-family: 'Roboto', 'Segoe UI', sans-serif;
    }
    body.light-theme .sync-status {
      background: rgba(255,248,240,0.9);
      border-color: rgba(0,0,0,0.1);
      color: #2a1508;
    }
    .sync-status.show { display: block; }
    .sync-status.success { border-color: #2ecc71; }
    .sync-status.error { border-color: #e74c3c; }
    body.light-theme .sync-status.success { border-color: #27ae60; }
    body.light-theme .sync-status.error { border-color: #c0392b; }

    /* ===== РЕДАКТИРОВАНИЕ ЗАКАЗА ===== */
    .modal-edit .modal-content { max-width: 800px; }
    .edit-item-row {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      flex-wrap: wrap;
    }
    body.light-theme .edit-item-row { border-bottom-color: rgba(0,0,0,0.05); }
    .edit-item-row select, .edit-item-row input {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 6px 12px;
      border-radius: 8px;
      color: white;
      font-size: 0.85rem;
      flex: 1;
      min-width: 100px;
      font-family: 'Roboto', 'Segoe UI', sans-serif;
    }
    body.light-theme .edit-item-row select,
    body.light-theme .edit-item-row input {
      background: rgba(255,255,255,0.7);
      border-color: rgba(0,0,0,0.12);
      color: #2a1508;
    }
    .edit-item-row .btn-sm { padding: 4px 12px; font-size: 0.75rem; }
    .btn-add-item { background: #2ecc71; color: #fff; }
    .btn-remove-item { background: #e74c3c; color: #fff; }
    .btn-save-order { background: #f7971e; color: #fff; }
    body.light-theme .btn-save-order { background: #c49a2a; }

    /* ===== МОДАЛКА ===== */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(5px);
      z-index: 300;
      justify-content: center;
      align-items: center;
      padding: 15px;
    }
    .modal.open { display: flex; }
    .modal-content {
      background: rgba(20,20,40,0.96);
      backdrop-filter: blur(25px);
      border: 1px solid rgba(255,255,255,0.08);
      max-width: 600px;
      width: 100%;
      border-radius: 20px;
      max-height: 90vh;
      overflow-y: auto;
      animation: modalIn 0.3s cubic-bezier(0.175,0.885,0.32,1.275);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      transition: background 0.3s ease, border-color 0.3s ease;
    }
    @keyframes modalIn {
      from { transform: translateY(30px) scale(0.95); opacity: 0; }
      to { transform: translateY(0) scale(1); opacity: 1; }
    }
    body.light-theme .modal-content {
      background: rgba(255,248,240,0.98);
      border-color: rgba(0,0,0,0.06);
    }
    .modal-header {
      padding: 16px 22px;
      background: rgba(255,255,255,0.02);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: 20px 20px 0 0;
    }
    .modal-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      color: #fff;
    }
    body.light-theme .modal-header h2 { color: #2a1508; }
    .close-modal {
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      font-size: 1.8rem;
      cursor: pointer;
      transition: all 0.3s;
    }
    .close-modal:hover { color: #e74c3c; transform: rotate(90deg); }
    .modal-body { padding: 20px; }
    .modal-body label {
      color: rgba(255,255,255,0.6);
      font-family: 'Roboto', 'Segoe UI', sans-serif;
      font-size: 0.85rem;
    }
    body.light-theme .modal-body label { color: rgba(0,0,0,0.6); }
    .modal-body input {
      width: 100%;
      padding: 10px 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      color: #fff;
      font-size: 0.9rem;
      transition: all 0.3s;
      font-family: 'Roboto', 'Segoe UI', sans-serif;
    }
    body.light-theme .modal-body input {
      background: rgba(0,0,0,0.02);
      border-color: rgba(0,0,0,0.08);
      color: #2a1508;
    }
    .modal-body input:focus { outline: none; border-color: #f7971e; }
    .modal-footer {
      padding: 14px 20px;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn-secondary {
      padding: 8px 20px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      color: #fff;
      cursor: pointer;
      font-weight: 600;

<script>
// ============================================================

const TELEGRAM_BOT_TOKEN = '1745757539:AAEUlkcpb8z7X7s8deuAJPD1saXM92YmOXA';
const TELEGRAM_CHAT_ID = '-1004480995803';
const TELEGRAM_API = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}`;
const JSONBIN_KEY = '$2a$10$AxIfA8p7dq6td0BYtWWuhecnyqCJbsTGoo.oWIds3H01C43GvLGuu';

// ============================================================
//  ТЕМА
// ============================================================
function toggleThemeAdmin() {

    document.body.classList.add('light-theme');

// ============================================================
//  АВТОРИЗАЦИЯ
// ============================================================
const ADMIN_PASSWORD = 'Sandyq2024';
let allOrders = [], allBookings = [], currentTab = 'orders';
let editingOrderIndex = -1;

function checkPassword(){
  if(document.getElementById('password').value===ADMIN_PASSWORD){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('admin-panel').style.display='block';
    document.body.style.display='block';document.body.style.alignItems='flex-start';

    loadAllData();
  }else{document.getElementById('error').style.display='block';}
}
function logout(){localStorage.removeItem('admin_logged_in');location.reload();}

// ============================================================
//  ЗАГРУЗКА ДАННЫХ
// ============================================================
async function loadAllData(){
  try {
    const res = await fetch(JSONBIN_URL + '/latest', { headers: { 'X-Master-Key': JSONBIN_KEY } });
    if (res.ok) {
      const data = await res.json();
      allOrders = data.record.orders || [];
      allBookings = data.record.bookings || [];
      showSyncStatus('✅ Данные загружены из облака', 'success');
    } else {
      throw new Error('Ошибка загрузки');
    }
  } catch(e) {
    console.warn('Ошибка загрузки из облака, беру локальные:', e);
    allOrders = JSON.parse(localStorage.getItem('orders') || '[]');
    allBookings = JSON.parse(localStorage.getItem('bookings') || '[]');
    showSyncStatus('⚠️ Загружены локальные данные', 'error');
  }
  loadCurrentTab();
}

async function syncWithCloud(){
  showSyncStatus('⏳ Синхронизация...', '');
  try {
    await fetch(JSONBIN_URL, {
      method: 'PUT',
      headers: { 'X-Master-Key': JSONBIN_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ orders: allOrders, bookings: allBookings })
    });
    showSyncStatus('✅ Данные синхронизированы с облаком', 'success');
  } catch(e) {
    showSyncStatus('❌ Ошибка синхронизации: ' + e.message, 'error');
  }
}

function saveToLocalStorage() {
  localStorage.setItem('orders', JSON.stringify(allOrders));
  localStorage.setItem('bookings', JSON.stringify(allBookings));
}

function showSyncStatus(text, type) {
  const el = document.getElementById('sync-status');
  el.textContent = text;
  el.className = 'sync-status show ' + (type || '');
  clearTimeout(el._hide);
  if (type) { el._hide = setTimeout(() => el.classList.remove('show'), 4000); }
}

// ============================================================
//  ВКЛАДКИ
// ============================================================
function loadCurrentTab(filterDate=''){
  document.getElementById('date-filter-row').style.display=currentTab==='stats'?'none':'flex';
  document.getElementById('date-range-row').style.display=currentTab==='stats'?'flex':'none';
  document.getElementById('dishes-stats').style.display=currentTab==='stats'?'none':'block';
  if(currentTab==='orders')loadOrders(filterDate);
  else if(currentTab==='bookings')loadBookings(filterDate);
  else if(currentTab==='stats')loadStatsRange();
}

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.admin-nav a').forEach(a=>a.classList.remove('active'));
  document.getElementById('tab-'+tab)?.classList.add('active');
  document.getElementById('total-badge').innerHTML=tab==='orders'?'📦 Заказов: <span id="orders-count">0</span>':tab==='bookings'?'📅 Броней: <span id="bookings-count">0</span>':'📊 Статистика';
  loadCurrentTab();
}

// ============================================================
//  ЗАКАЗЫ
// ============================================================
function loadOrders(filterDate=''){
  let orders = allOrders;
  if(filterDate) orders = orders.filter(o => o.date === filterDate);
  
  const cityFilter = document.getElementById('filter-city')?.value || 'all';
  if(cityFilter !== 'all') orders = orders.filter(o => o.city === cityFilter);
  
  document.getElementById('orders-count').textContent = orders.length;
  showStats(orders, 'orders');
  showDishesStats(orders);
  const list = document.getElementById('tab-content');
  if(!orders.length){ list.innerHTML = '<div class="empty-orders"><p>Нет заказов</p></div>'; return; }
  list.innerHTML = '<div class="section-title">📋 Заказы</div>' + [...orders].reverse().map((o, idx) => {
    const ri = orders.length - 1 - idx;
    const cityName = o.city === 'astana' ? 'Астана' : 'Алматы';
    const cityTag = `<span class="city-tag">${cityName}</span>`;
    return `<div class="order-card">
      <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px">
        <div><b>#${String(o.id).slice(-6)}</b> ${cityTag} 👤 ${o.guest?.name||'—'} 📞 ${o.guest?.phone||'—'}</div>
        <div>📍 ${o.restaurant||'Sandyq'} | 📅 ${o.date||'—'}</div>
      </div>
      ${(o.items||[]).map(i => `<div style="display:flex;justify-content:space-between;padding:3px 0"><span>${i.name?.ru||'Блюдо'} ×${i.quantity||1}</span><span>${((i.price||0)*(i.quantity||1)).toLocaleString()} ₸</span></div>`).join('')}
      ${o.special ? `<div style="color:rgba(255,255,255,0.4);font-size:0.85rem;margin:6px 0;">💬 ${o.special}</div>` : ''}
      <div class="order-total">💰 ${(o.total||0).toLocaleString()} ₸</div>
      <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
        <button class="btn btn-print" onclick="printOrder(${ri})">🖨️</button>
        <button class="btn btn-pdf" onclick="downloadOrderPDF(${ri})">📄</button>
        <button class="btn btn-edit" onclick="openEditOrder(${ri})">✏️</button>
        <button class="btn btn-delete" onclick="deleteOrder(${ri})">🗑️</button>
      </div>
    </div>`;
  }).join('');
}

function loadBookings(filterDate=''){
  let bookings = allBookings;
  if(filterDate) bookings = bookings.filter(b => b.date === filterDate);
  
  const cityFilter = document.getElementById('filter-city')?.value || 'all';
  if(cityFilter !== 'all') bookings = bookings.filter(b => b.city === cityFilter);
  
  document.getElementById('bookings-count').textContent = bookings.length;
  showStats(bookings, 'bookings');
  document.getElementById('dishes-stats').innerHTML = '';
  const list = document.getElementById('tab-content');
  if(!bookings.length){ list.innerHTML = '<div class="empty-orders"><p>Нет броней</p></div>'; return; }
  list.innerHTML = '<div class="section-title">📅 Бронирования</div>' + [...bookings].reverse().map((b, idx) => {
    const ri = bookings.length - 1 - idx;
    const cityName = b.city === 'astana' ? 'Астана' : 'Алматы';
    const cityTag = `<span class="city-tag">${cityName}</span>`;
    return `<div class="booking-card">
      <div><b>🪑 Стол №${b.table}</b> ${cityTag} 🏛️ ${b.hallName||b.hall||'—'} | 📅 ${b.date||'—'} ⏰ ${b.time||'—'}</div>
      <p>👤 ${b.name||'—'} | 📞 ${b.phone||'—'} | 👥 ${b.guests||'—'} персон</p>
      ${b.special ? `<div style="color:rgba(255,255,255,0.4);font-size:0.85rem;margin:6px 0;">💬 ${b.special}</div>` : ''}
      <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
        <button class="btn btn-preorder" onclick="checkPreorder('${b.phone}','${b.date}')">📋 Предзаказ</button>
        <button class="btn btn-pdf" onclick="downloadBookingPDF(${ri})">📄</button>
        <button class="btn btn-delete" onclick="deleteBooking(${ri})">🗑️</button>
      </div>
    </div>`;
  }).join('');
}

// ============================================================
//  СТАТИСТИКА
// ============================================================
function loadStatsRange(){
  const from = document.getElementById('date-from').value;
  const to = document.getElementById('date-to').value;
  let orders = allOrders;
  if(from) orders = orders.filter(o => o.date >= from);
  if(to) orders = orders.filter(o => o.date <= to);
  let bookings = allBookings;
  if(from) bookings = bookings.filter(b => b.date >= from);
  if(to) bookings = bookings.filter(b => b.date <= to);
  
  const cityFilter = document.getElementById('filter-city')?.value || 'all';
  if(cityFilter !== 'all') {
    orders = orders.filter(o => o.city === cityFilter);
    bookings = bookings.filter(b => b.city === cityFilter);
  }

  const rev = orders.reduce((s,o) => s + (o.total||0), 0);
  const items = orders.reduce((s,o) => s + (o.items||[]).reduce((ss,i) => ss + (i.quantity||1), 0), 0);
  const avg = orders.length ? Math.round(rev/orders.length) : 0;

  document.getElementById('stats-container').innerHTML = `
    <div class="stat-card"><div class="stat-value">${orders.length}</div><div class="stat-label">Заказов</div></div>
    <div class="stat-card"><div class="stat-value">${rev.toLocaleString()}₸</div><div class="stat-label">Выручка</div></div>
    <div class="stat-card"><div class="stat-value">${items}</div><div class="stat-label">Позиций</div></div>
    <div class="stat-card"><div class="stat-value">${avg.toLocaleString()}₸</div><div class="stat-label">Средний чек</div></div>
    <div class="stat-card"><div class="stat-value">${bookings.length}</div><div class="stat-label">Броней</div></div>`;

  const byDate = {};
  orders.forEach(o => { const d = o.date||'—'; if(!byDate[d]) byDate[d]=0; byDate[d] += o.total||0; });
  const sorted = Object.entries(byDate).sort((a,b) => a[0].localeCompare(b[0]));
  const maxVal = Math.max(...sorted.map(([,v]) => v), 1);
  let bars = '';
  sorted.forEach(([date, val]) => {
    const h = (val/maxVal * 100).toFixed(0);
    bars += `<div class="chart-bar" style="height:${h}%" title="${date}: ${val.toLocaleString()}₸"><div class="chart-bar-value">${val.toLocaleString()}</div><div class="chart-bar-label">${date.slice(5)}</div></div>`;
  });

  const byHall = {};
  bookings.forEach(b => { const h = b.hallName||b.hall||'—'; if(!byHall[h]) byHall[h]=0; byHall[h]++; });
  let hallRows = '';
  for(const [hall, cnt] of Object.entries(byHall)) hallRows += `<tr><td>${hall}</td><td>${cnt}</td></tr>`;

  document.getElementById('tab-content').innerHTML = `
    <div class="section-title">📊 Выручка по дням</div>
    <div class="chart-container"><div class="chart-bars">${bars||'<p style="color:rgba(255,255,255,0.3)">Нет данных</p>'}</div></div>
    <div class="section-title">🏆 Топ-10 блюд</div>
    <div class="dishes-stats">${getTopDishesHTML(orders)}</div>
    <div class="section-title">📅 Брони по залам</div>
    <table class="booking-stats-table"><tr><th>Зал</th><th>Броней</th></tr>${hallRows||'<tr><td colspan="2">Нет данных</td></tr>'}</table>`;
}

function getTopDishesHTML(orders){
  const map = {};
  orders.forEach(o => (o.items||[]).forEach(i => {
    const k = i.name?.ru || 'Блюдо';
    if(!map[k]) map[k] = {name:k, qty:0, rev:0};
    map[k].qty += (i.quantity||1);
    map[k].rev += (i.price||0) * (i.quantity||1);
  }));
  return Object.values(map).sort((a,b) => b.rev - a.rev).slice(0,10).map(d => 
    `<div class="dish-stat-row"><span>${d.name}</span><span>×${d.qty} | ${d.rev.toLocaleString()}₸</span></div>`
  ).join('');
}

// ============================================================
//  ЭКСПОРТ
// ============================================================
function exportToExcel(){
  const from = document.getElementById('date-from').value;
  const to = document.getElementById('date-to').value;
  const cityFilter = document.getElementById('filter-city')?.value || 'all';
  let orders = allOrders;
  if(from) orders = orders.filter(o => o.date >= from);
  if(to) orders = orders.filter(o => o.date <= to);
  if(cityFilter !== 'all') orders = orders.filter(o => o.city === cityFilter);
  
  let csv = '\uFEFFID;Дата;Город;Гость;Телефон;Сумма;Позиций\n';
  orders.forEach(o => { 
    const cityName = o.city === 'astana' ? 'Астана' : 'Алматы';
    csv += `${o.id};${o.date};${cityName};${o.guest?.name||''};${o.guest?.phone||''};${o.total||0};${(o.items||[]).length}\n`; 
  });
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `sandyq-stats-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

function checkPreorder(phone, date){
  const order = allOrders.find(o => o.guest?.phone === phone && o.date === date);
  alert(order ? `✅ Предзаказ #${String(order.id).slice(-6)}\n💰 ${(order.total||0).toLocaleString()}₸` : '❌ Не найден');
}

function showStats(data, type){
  const rev = data.reduce((s,o) => s + (o.total||0), 0);
  const items = data.reduce((s,o) => s + (o.items||[]).reduce((ss,i) => ss + (i.quantity||1), 0), 0);
  document.getElementById('stats-container').innerHTML = `
    <div class="stat-card"><div class="stat-value">${data.length}</div><div class="stat-label">${type==='orders'?'Заказов':'Броней'}</div></div>
    ${type==='orders'?`<div class="stat-card"><div class="stat-value">${rev.toLocaleString()}₸</div><div class="stat-label">Выручка</div></div><div class="stat-card"><div class="stat-value">${items}</div><div class="stat-label">Позиций</div></div>`:''}`;
}

function showDishesStats(orders){
  const map = {};
  orders.forEach(o => (o.items||[]).forEach(i => {
    const k = i.name?.ru || 'Блюдо';
    if(!map[k]) map[k] = {name:k, qty:0};
    map[k].qty += (i.quantity||1);
  }));
  document.getElementById('dishes-stats').innerHTML = '<h4 style="margin-bottom:15px;font-family:Playfair Display,serif;color:#f7971e;">📊 Популярность блюд</h4>' + 
    Object.values(map).sort((a,b) => b.qty - a.qty).map(d => 
      `<div class="dish-stat-row"><span>${d.name}</span><span class="dish-stat-qty">×${d.qty}</span></div>`
    ).join('');
}

// ============================================================
//  ПЕЧАТЬ И PDF
// ============================================================
function printOrder(idx){
  const o = allOrders[idx];
  if(!o) return;
  const w = window.open('','','width=850,height=700');
  const cityName = o.city === 'astana' ? 'Астана' : 'Алматы';
  w.document.write(`<html><body style="font-family:Georgia;padding:40px"><div style="border:3px solid #c49a2a;padding:30px"><h1>🍽️ SANDYQ</h1><p>📍 ${o.restaurant||'Sandyq'}</p><p>👤 ${o.guest?.name} | 📞 ${o.guest?.phone} | 📅 ${o.date}</p><table style="width:100%;border-collapse:collapse">${(o.items||[]).map(i => `<tr><td>${i.name?.ru}</td><td>×${i.quantity}</td><td>${((i.price||0)*(i.quantity||1)).toLocaleString()}₸</td></tr>`).join('')}</table><p style="text-align:right;font-size:18px;color:#8B6914"><b>💰 ${(o.total||0).toLocaleString()}₸</b></p></div><script>window.onload=function(){window.print()}<\/script></body></html>`);
  w.document.close();
}

function downloadOrderPDF(idx){ printOrder(idx); }

function downloadBookingPDF(idx){
  const b = allBookings[idx];
  if(!b) return;
  const cityName = b.city === 'astana' ? 'Астана' : 'Алматы';
  const w = window.open('','','width=700,height=500');
  w.document.write(`<html><body style="font-family:Georgia;padding:40px"><div style="border:3px solid #3498db;padding:30px"><h1>📅 БРОНИРОВАНИЕ</h1><p>📍 ${b.restaurant||'Sandyq'}</p><p>Стол №${b.table} | ${b.hallName||b.hall||'—'}</p><p>👤 ${b.name} | 📞 ${b.phone} | 👥 ${b.guests} | 📅 ${b.date} ⏰ ${b.time}</p></div><script>window.onload=function(){window.print()}<\/script></body></html>`);
  w.document.close();
}

function downloadAllPDF(){
  if(!allOrders.length) return alert('Нет заказов');
  const w = window.open('','','width=900,height=700');
  w.document.write(`<html><body style="font-family:Georgia;padding:30px"><h1>🍽️ SANDYQ — Все заказы</h1>${[...allOrders].reverse().map(o => `<div style="border:1px solid #ccc;padding:10px;margin:10px 0"><b>#${String(o.id).slice(-6)}</b> ${o.city==='astana'?'Астана':'Алматы'} 👤 ${o.guest?.name} 📅 ${o.date} 💰 ${(o.total||0).toLocaleString()}₸</div>`).join('')}</body></html>`);
  w.document.close();
  setTimeout(() => w.print(), 500);
}

// ============================================================
//  РЕДАКТИРОВАНИЕ ЗАКАЗА
// ============================================================
function openEditOrder(idx){
  editingOrderIndex = idx;
  const order = allOrders[idx];
  if(!order) return;
  
  document.getElementById('edit-order-id').textContent = String(order.id).slice(-6);
  document.getElementById('edit-guest-name').value = order.guest?.name || '';
  document.getElementById('edit-guest-phone').value = order.guest?.phone || '';
  document.getElementById('edit-order-date').value = order.date || '';
  
  renderEditItems(order.items || []);
  document.getElementById('edit-order-modal').classList.add('open');
}

function closeEditModal(){
  document.getElementById('edit-order-modal').classList.remove('open');
  editingOrderIndex = -1;
}

function renderEditItems(items){
  const container = document.getElementById('edit-items-container');
  if(!items.length){
    container.innerHTML = '<p style="color:rgba(255,255,255,0.4);">Нет позиций</p>';
    return;
  }
  container.innerHTML = items.map((item, idx) => `
    <div class="edit-item-row" data-idx="${idx}">
      <select class="edit-item-select">
        ${getAllMenuItemsOptions(item.name?.ru || '')}
      </select>
      <input type="number" class="edit-item-qty" value="${item.quantity || 1}" min="1" style="width:70px;">
      <input type="number" class="edit-item-price" value="${item.price || 0}" min="0" style="width:100px;">
      <button class="btn btn-remove-item btn-sm" onclick="removeEditItem(${idx})">✕</button>
    </div>
  `).join('');
}

function getAllMenuItemsOptions(selected){
  const allItems = [
    'Салат из свежих овощей','Салат «Костұра»','Салат «Сандық»','Баклажаны в соусе из курта','Ассорти овощей',
    '«Құйрық май» с кумысом','«Шеке»','«Жілік май»','«Ұйқы ашар»','«Құйрық бауыр»','«Үлпершек»','Ми Палау','Осетровая икра',
    'Суп «Жібек жолы»','Коже «Nomad»','Суп из индейки','Суп из перепелки','«Жарма көже»','«Көл кеспе»',
    '«Қазақ ет» (Бешбармақ)','«Борша ет» на камнях','«Бал қуырдақ»','«Ши қуырдақ»','«Бұқпа» из говядины','«Қымыз қабырға»','Томленая шея баранины','«Қақталған қазы»','Горная форель','«Нан салма»',
    '«Сый табақ» (5-6)','«Той табақ» (5-6)','«Қарын көмбе» (5-6)','«Бел көтерер» (5-6)','«Хан сырбаз» (5-6)','«Бекіре» (5-6)',
    'Бауырсаки с вареньем','Баурсаки с сыром','«Мыжыма»','«Бәрәміш»','«Таба нан»','«Қаттама»','«Нан астау»',
    '«Чизкейк» из тары','Финик с орехами','Сладости «Сандық»','Десерт «Сүмесүт»','Хрустящий пирог','«Төңкерме»','«Майсөк»','«Алматинский апорт»','Мороженое',
    'Шубат','Шалап','Кумыс','Кус-кус','Булгур','Молодой картофель'
  ];
  let options = '';
  allItems.forEach(name => {
    const selectedAttr = name === selected ? 'selected' : '';
    options += `<option value="${name}" ${selectedAttr}>${name}</option>`;
  });
  return options;
}

function addEditItemRow(){
  const container = document.getElementById('edit-items-container');
  const rows = container.querySelectorAll('.edit-item-row');
  const idx = rows.length;
  const row = document.createElement('div');
  row.className = 'edit-item-row';
  row.dataset.idx = idx;
  row.innerHTML = `
    <select class="edit-item-select">
      ${getAllMenuItemsOptions('')}
    </select>
    <input type="number" class="edit-item-qty" value="1" min="1" style="width:70px;">
    <input type="number" class="edit-item-price" value="0" min="0" style="width:100px;">
    <button class="btn btn-remove-item btn-sm" onclick="removeEditItem(${idx})">✕</button>
  `;
  container.appendChild(row);
}

function removeEditItem(idx){
  const rows = document.querySelectorAll('.edit-item-row');
  const row = rows[idx];
  if(row) row.remove();
}

async function saveEditedOrder(){
  if(editingOrderIndex < 0) return;
  
  const order = allOrders[editingOrderIndex];
  if(!order) return;
  
  order.guest.name = document.getElementById('edit-guest-name').value.trim() || 'Гость';
  order.guest.phone = document.getElementById('edit-guest-phone').value.trim() || '—';
  order.date = document.getElementById('edit-order-date').value || new Date().toISOString().slice(0,10);
  
  const rows = document.querySelectorAll('.edit-item-row');
  const items = [];
  rows.forEach(row => {
    const select = row.querySelector('.edit-item-select');
    const qty = parseInt(row.querySelector('.edit-item-qty').value) || 1;
    const price = parseInt(row.querySelector('.edit-item-price').value) || 0;
    if(select && select.value){
      items.push({
        name: { ru: select.value },
        quantity: qty,
        price: price,
        category: 'main'
      });
    }
  });
  order.items = items;
  
  const sub = items.reduce((s, i) => s + i.price * i.quantity, 0);
  const serv = Math.round(sub * 0.15);
  order.subtotal = sub;
  order.service = serv;
  order.total = sub + serv;
  
  saveToLocalStorage();
  await syncWithCloud();
  closeEditModal();
  loadOrders(document.getElementById('filter-date')?.value || '');
  showSyncStatus('✅ Заказ обновлён!', 'success');
}

function deleteOrder(idx){
  if(!confirm('Удалить заказ?')) return;
  allOrders.splice(idx, 1);
  saveToLocalStorage();
  syncWithCloud();
  loadOrders();
  showSyncStatus('🗑️ Заказ удалён', 'success');
}

function deleteBooking(idx){
  if(!confirm('Удалить бронь?')) return;
  allBookings.splice(idx, 1);
  saveToLocalStorage();
  syncWithCloud();
  loadBookings();
  showSyncStatus('🗑️ Бронь удалена', 'success');
}

function clearAllData(){
  if(!confirm('Удалить ВСЕ данные?')) return;
  allOrders = [];
  allBookings = [];
  saveToLocalStorage();
  syncWithCloud();
  loadAllData();
  showSyncStatus('🗑️ Все данные удалены', 'success');
}

document.getElementById('edit-order-modal').addEventListener('click', function(e) {
  if (e.target === this) closeEditModal();
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeEditModal();
});

setInterval(loadAllData, 30000);
</script>
